<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Eyad_Eyad12 - الصفحة الشخصية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== خلفية الفيديو المتجاوبة بالكامل ===== */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    }

    .video-background video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* طبقة تعتيم فوق الفيديو لتحسين قراءة النص */
    .video-background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }

    /* للشاشات الكبيرة والمتوسطة */
    @media (min-width: 768px) {
      .video-background video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    }

    /* جزيئات ونجوم */
    .particles, .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(220, 20, 60, 0.7);
      border-radius: 50%;
      animation: floatParticle 12s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* الحاوية الرئيسية - بدون أي تأثير زجاجي */
    .container {
      background: transparent;
      padding: 2rem 2.2rem;
      max-width: 550px;
      width: 100%;
      position: relative;
      z-index: 10;
      transition: transform 0.2s ease-out;
    }

    /* صورة البروفايل */
    .profile-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .profile-image-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 1.8rem;
      animation: floatImage 4s ease-in-out infinite;
    }

    @keyframes floatImage {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .profile-image {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(220, 20, 60, 0.9);
      box-shadow: 0 0 30px rgba(220, 20, 60, 0.6);
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      background: #1a1a2e;
    }

    .profile-image:hover {
      transform: scale(1.05) rotate(3deg);
    }

    .profile-glow {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 20, 60, 0.3) 0%, transparent 70%);
      animation: pulseGlow 2.2s infinite;
      z-index: -1;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.4; transform: scale(0.95);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    .name {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff3366, #ff6b9d, #dc143c);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      animation: textShine 4s linear infinite;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    @keyframes textShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .rose-icon {
      font-size: 2.2rem;
      color: #dc143c;
      display: inline-block;
      animation: rotateRose 5s linear infinite;
      filter: drop-shadow(0 0 6px #dc143c);
    }

    @keyframes rotateRose {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .description {
      color: #f9f9f9;
      font-size: 1.05rem;
      line-height: 1.7;
      text-shadow: 0 1px 4px black;
      margin: 1rem 0;
      font-weight: 500;
    }

    .donate-section {
      margin: 2rem 0;
      text-align: center;
    }

    .donate-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 2.2rem;
      background: linear-gradient(125deg, #dc143c, #ff3366);
      border: none;
      border-radius: 60px;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: 0 8px 22px rgba(220, 20, 60, 0.5);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .donate-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 35px rgba(220, 20, 60, 0.7);
      gap: 18px;
    }

    .contact-section {
      margin-top: 2rem;
      padding-top: 1.8rem;
      border-top: 2px dashed rgba(220, 60, 80, 0.5);
    }

    .contact-title {
      color: #ffb7c5;
      font-size: 1.3rem;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
      text-shadow: 0 1px 2px black;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.25s;
    }

    .social-btn i {
      font-size: 1.5rem;
    }

    .tiktok:hover {
      background: #000000cc;
      border-color: #00f2ea;
      box-shadow: 0 0 15px #00f2ea80;
      transform: translateY(-3px);
    }

    .telegram:hover {
      background: #0088cccc;
      border-color: #29b6f6;
      transform: translateY(-3px);
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #eee;
      text-shadow: 0 1px 2px black;
    }

    .heart {
      color: #ff2a5e;
      display: inline-block;
      animation: heartbeat 1.4s infinite;
    }

    @keyframes heartbeat {
      0%,100%{ transform: scale(1);}
      25%{ transform: scale(1.2);}
    }

    /* مودال تسجيل الدخول */
    .login-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .login-modal.active {
      display: flex;
    }

    .login-content {
      background: rgba(15, 12, 20, 0.95);
      padding: 2rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid #dc143c;
      box-shadow: 0 0 40px rgba(220, 20, 60, 0.4);
      text-align: center;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 12px;
      left: 20px;
      background: #dc143c;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: #b01030;
      transform: rotate(90deg);
    }

    .login-title {
      color: #dc143c;
      margin-bottom: 1.8rem;
    }

    .input-group {
      margin-bottom: 1rem;
      text-align: right;
    }

    .input-group label {
      display: block;
      color: #fcb0c0;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #dc143c60;
      border-radius: 14px;
      color: white;
      font-size: 1rem;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ff3366;
      box-shadow: 0 0 12px #ff3366;
    }

    .login-btn {
      width: 100%;
      background: #dc143c;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      margin-top: 1rem;
      cursor: pointer;
    }

    .error-message {
      color: #ff8866;
      margin-top: 1rem;
      display: none;
      font-weight: bold;
    }

    .error-message.active {
      display: block;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }
      .name {
        font-size: 1.9rem;
      }
      .profile-image-wrapper {
        width: 130px;
        height: 130px;
      }
      .social-btn {
        padding: 0.5rem 1.2rem;
        font-size: 0.9rem;
      }
      .donate-btn {
        padding: 0.8rem 1.5rem;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

<!-- خلفية الفيديو المتجاوبة -->
<div class="video-background">
  <video autoplay muted loop playsinline>
    <!-- ضع رابط الفيديو الخاص بك هنا -->
    <source src="background-video.mp4" type="video/mp4" />

  </video>
</div>

<div class="particles" id="particles"></div>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="profile-section">
    <div class="profile-image-wrapper">
      <div class="profile-glow"></div>
      <img src="aime13.jpg" alt="Eyad Profile" class="profile-image" onerror="this.src='https://via.placeholder.com/200/222?text=EYAD'" />
    </div>
    <h1 class="name">Eyad_Eyad12</h1>

  <div class="donate-section">

      <i class="fas fa-lock"></i>

    <div class="social-links">
      <a href="https://www.tiktok.com/@eyad_eyad120?_r=1&_t=ZS-95wTIm4RItF" target="_blank" class="social-btn tiktok">
        <i class="fab fa-tiktok"></i> <span>TikTok</span>
      </a>
      <a href="https://t.me/eyad_eyad120" target="_blank" class="social-btn telegram">

      </a>

  <div class="footer">

</div>

<!-- Modal -->
<div class="login-modal" id="loginModal">
  <div class="login-content">
    <button class="close-btn" id="closeBtn">×</button>
    <h2 class="login-title">🔐 تسجيل الدخول للوصول</h2>
    <div class="input-group">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم" />
    </div>
    <div class="input-group">
      <label for="password">الرمز السري</label>
      <input type="password" id="password" placeholder="الرمز السري" />
    </div>
    <button class="login-btn" id="loginBtn">دخول</button>
    <div class="error-message" id="errorMessage">❌ اسم المستخدم أو الرمز السري غير صحيح!</div>
  </div>
</div>

<script>
  const users = {
    eyad1: "eyad2024@", ahmad: "ahmad123#", mohammed: "mo2024$", ali: "ali999*",
    hassan: "hassan777!", omar: "omar2024&", youssef: "youssef555%",
    khalid: "khalid333^", salem: "salem888(", rami: "rami2024)",
  };

  // جزيئات ونجوم
  const particlesDiv = document.getElementById('particles');
  for (let i = 0; i < 45; i++) {
    let p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 12 + 's';
    p.style.animationDuration = 8 + Math.random() * 10 + 's';
    particlesDiv.appendChild(p);
  }
  const starsDiv = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    let s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 4 + 's';
    starsDiv.appendChild(s);
  }

  // Modal logic
  const donateBtn = document.getElementById('donateBtn');
  const modal = document.getElementById('loginModal');
  const closeBtn = document.getElementById('closeBtn');
  const loginBtn = document.getElementById('loginBtn');
  const usernameInp = document.getElementById('username');
  const passwordInp = document.getElementById('password');
  const errorMsgDiv = document.getElementById('errorMessage');

  donateBtn.addEventListener('click', () => {
    modal.classList.add('active');
    usernameInp.value = '';
    passwordInp.value = '';
    errorMsgDiv.classList.remove('active');
  });

  closeBtn.addEventListener('click', () => modal.classList.remove('active'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

  loginBtn.addEventListener('click', () => {
    const user = usernameInp.value.trim();
    const pass = passwordInp.value;
    if (users[user] && users[user] === pass) {
      modal.classList.remove('active');
      window.open('https://www.donationalerts.com/auth/login?redirectTo=https%3A%2F%2Fwww.donationalerts.com%2Fdashboard%2Fpayouts', '_blank');
    } else {
      errorMsgDiv.classList.add('active');
      usernameInp.style.borderColor = '#ff5555';
      passwordInp.style.borderColor = '#ff5555';
      setTimeout(() => {
        usernameInp.style.borderColor = '#dc143c60';
        passwordInp.style.borderColor = '#dc143c60';
      }, 1200);
    }
  });

  passwordInp.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
  usernameInp.addEventListener('input', () => errorMsgDiv.classList.remove('active'));
  passwordInp.addEventListener('input', () => errorMsgDiv.classList.remove('active'));

  // تأثير الماوس على الحاوية
  const container = document.querySelector('.container');
  document.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const rotX = (y - centerY) / 45;
    const rotY = (centerX - x) / 45;
    container.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  });
  container.addEventListener('mouseleave', () => {
    container.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
  });
</script>
</body>
</html>
