<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eyad_Eyad12 - الصفحة الشخصية</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
      }

      /* فيديو الخلفية */
      .video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .video-background video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.4);
      }

      .video-background::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      }

      .particles {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(220, 20, 60, 0.6);
        border-radius: 50%;
        animation: float 15s infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) translateX(100px);
          opacity: 0;
        }
      }

      .container {
        background: transparent;
        border-radius: 30px;
        box-shadow: none;
        padding: 50px 40px;
        max-width: 500px;
        width: 100%;
        position: relative;
        z-index: 2;
        border: none;
        animation: none;
        backdrop-filter: none;
      }

      @keyframes containerGlow {
        0% {
          box-shadow: none;
        }
        100% {
          box-shadow: none;
        }
      }

      .profile-section {
        text-align: center;
        margin-bottom: 40px;
      }

      .profile-image-wrapper {
        position: relative;
        width: 200px;
        height: 200px;
        margin: 0 auto 30px;
        animation: float-image 4s ease-in-out infinite;
      }

      @keyframes float-image {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .profile-image {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid rgba(220, 20, 60, 0.7);
        box-shadow:
          0 0 40px rgba(220, 20, 60, 0.4),
          inset 0 0 20px rgba(0, 0, 0, 0.4);
        transition: transform 0.5s ease;
        cursor: pointer;
      }

      .profile-image:hover {
        transform: scale(1.1) rotate(5deg);
      }

      .profile-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(220, 20, 60, 0.35) 0%,
          transparent 65%
        );
        animation: pulse 2s infinite;
        top: 0;
        left: 0;
        z-index: -1;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }

      .name {
        font-size: 2.5em;
        font-weight: bold;
        background: linear-gradient(45deg, #dc143c, #ff6b9d);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 15px;
        text-shadow: 0 0 30px rgba(220, 20, 60, 0.5);
        animation: shine 3s infinite;
      }

      @keyframes shine {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.3);
        }
      }

      .description {
        color: #ddd;
        font-size: 1.1em;
        line-height: 1.8;
        margin-bottom: 20px;
        text-align: center;
      }

      .rose-icon {
        font-size: 2em;
        color: #dc143c;
        margin: 10px 0;
        animation: rotate 4s linear infinite;
      }

      @keyframes rotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .donate-section {
        margin: 30px 0;
        text-align: center;
      }

      .donate-btn {
        display: inline-flex;
        align-items: center;
        gap: 15px;
        padding: 20px 35px;
        background: linear-gradient(135deg, #dc143c 0%, #ff1744 100%);
        color: white;
        text-decoration: none;
        border-radius: 15px;
        font-size: 1.3em;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 0 10px 30px rgba(220, 20, 60, 0.4);
        position: relative;
        overflow: hidden;
        cursor: pointer;
        border: none;
      }

      .donate-btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .donate-btn:hover::before {
        width: 400px;
        height: 400px;
      }

      .donate-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(220, 20, 60, 0.6);
      }

      .donate-btn i {
        font-size: 1.2em;
      }

      /* Login Modal */
      .login-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.3s ease;
      }

      .login-modal.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .login-content {
        background: linear-gradient(
          135deg,
          rgba(20, 20, 20, 0.98),
          rgba(40, 0, 0, 0.98)
        );
        padding: 40px;
        border-radius: 25px;
        text-align: center;
        position: relative;
        border: 3px solid rgba(220, 20, 60, 0.5);
        box-shadow: 0 0 60px rgba(220, 20, 60, 0.6);
        animation: scaleIn 0.4s ease;
        max-width: 450px;
        width: 90%;
      }

      @keyframes scaleIn {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .close-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        width: 40px;
        height: 40px;
        background: rgba(220, 20, 60, 0.8);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 1.5em;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .close-btn:hover {
        background: #dc143c;
        transform: rotate(90deg);
      }

      .login-title {
        color: #dc143c;
        font-size: 1.8em;
        margin-bottom: 30px;
        font-weight: bold;
      }

      .input-group {
        margin-bottom: 20px;
        text-align: right;
      }

      .input-group label {
        display: block;
        color: #ddd;
        margin-bottom: 10px;
        font-weight: bold;
        font-size: 1.1em;
      }

      .input-group input {
        width: 100%;
        padding: 15px;
        border: 2px solid rgba(220, 20, 60, 0.3);
        background: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        color: white;
        font-size: 1em;
        transition: all 0.3s ease;
      }

      .input-group input:focus {
        outline: none;
        border-color: #dc143c;
        box-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
      }

      .login-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #dc143c 0%, #ff1744 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 20px;
      }

      .login-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(220, 20, 60, 0.6);
      }

      .error-message {
        color: #ff4444;
        margin-top: 15px;
        font-weight: bold;
        display: none;
      }

      .error-message.active {
        display: block;
        animation: shake 0.5s;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .contact-section {
        margin-top: 40px;
        padding-top: 30px;
        border-top: 2px solid rgba(220, 20, 60, 0.3);
      }

      .contact-title {
        text-align: center;
        color: #dc143c;
        font-size: 1.3em;
        font-weight: bold;
        margin-bottom: 25px;
        text-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
      }

      .social-links {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
      }

      .social-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 15px 30px;
        background: rgba(220, 20, 60, 0.1);
        border: 2px solid rgba(220, 20, 60, 0.5);
        border-radius: 50px;
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .social-btn::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          rgba(220, 20, 60, 0.3),
          rgba(255, 107, 157, 0.3)
        );
        top: 100%;
        left: 0;
        transition: top 0.3s ease;
      }

      .social-btn:hover::after {
        top: 0;
      }

      .social-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(220, 20, 60, 0.4);
        border-color: #dc143c;
      }

      .social-btn i {
        font-size: 1.5em;
        z-index: 1;
      }

      .social-btn span {
        z-index: 1;
      }

      .tiktok {
        background: rgba(0, 242, 234, 0.1);
        border-color: rgba(0, 242, 234, 0.5);
      }

      .tiktok:hover {
        border-color: #00f2ea;
        box-shadow: 0 10px 25px rgba(0, 242, 234, 0.4);
      }

      .telegram {
        background: rgba(0, 136, 204, 0.1);
        border-color: rgba(0, 136, 204, 0.5);
      }

      .telegram:hover {
        border-color: #0088cc;
        box-shadow: 0 10px 25px rgba(0, 136, 204, 0.4);
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        color: #999;
        font-size: 0.9em;
      }

      .heart {
        color: #dc143c;
        animation: heartbeat 1.5s infinite;
      }

      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.2);
        }
        50% {
          transform: scale(1);
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 30px 20px;
        }

        .name {
          font-size: 2em;
        }

        .profile-image-wrapper {
          width: 150px;
          height: 150px;
        }

        .social-links {
          flex-direction: column;
        }

        .social-btn {
          width: 100%;
          justify-content: center;
        }
      }

      .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 0;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="video-background">
      <video autoplay muted loop playsinline id="bgVideo">
        <source src="background-video.mp4" type="video/mp4" />
      </video>
    </div>

    <div class="particles" id="particles"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
      <div class="profile-section">
        <div class="profile-image-wrapper">
          <div class="profile-glow"></div>
          <img src="rose-image.jpg" alt="Eyad Profile" class="profile-image" />
        </div>

        <h1 class="name">Eyad_Eyad12</h1>
        <div class="rose-icon">💻</div>

        <p class="description">
          مرحباً بك في صفحتي الشخصية<br />
          مبرمج ومطور محتوى<br />
        </p>
      </div>

      <div class="donate-section">
        <button class="donate-btn" id="donateBtn">
          <i class="fas fa-lock"></i>
          <span>موقعي </span>
          <i class="fas fa-heart"></i>
        </button>
      </div>

      <div class="contact-section">
        <h3 class="contact-title">💬 للطلب والاستفسار تواصل معي</h3>

        <div class="social-links">
          <a
            href="https://www.tiktok.com/@eyad_eyad120?_r=1&_t=ZS-95wTIm4RItF"
            target="_blank"
            class="social-btn tiktok"
          >
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
          </a>

          <a
            href="https://t.me/eyad_eyad120"
            target="_blank"
            class="social-btn telegram"
          >
            <i class="fab fa-telegram"></i>
            <span>Telegram</span>
          </a>
        </div>
      </div>

      <div class="footer">
        <p>Made with <span class="heart">♥</span> by Eyad_Eyad12</p>
        <p style="margin-top: 10px; font-size: 0.85em">
          © 2020 All Rights Reserved
        </p>
      </div>
    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
      <div class="login-content">
        <button class="close-btn" id="closeBtn">×</button>
        <h2 class="login-title">🔐 تسجيل الدخول للموقع</h2>

        <div class="input-group">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم" />
        </div>

        <div class="input-group">
          <label for="password">الرمز السري</label>
          <input type="password" id="password" placeholder="أدخل الرمز السري" />
        </div>

        <button class="login-btn" id="loginBtn">دخول</button>

        <div class="error-message" id="errorMessage">
          ❌ اسم المستخدم أو الرمز السري غير صحيح!
        </div>
      </div>
    </div>

    <script>
      // قاعدة بيانات المستخدمين والرموز (10 مستخدمين)
      const users = {
        eyad1: "eyad2024@",
        ahmad: "ahmad123#",
        mohammed: "mo2024$",
        ali: "ali999*",
        hassan: "hassan777!",
        omar: "omar2024&",
        youssef: "youssef555%",
        khalid: "khalid333^",
        salem: "salem888(",
        rami: "rami2024)",
      };

      // إنشاء الجزيئات
      const particlesContainer = document.getElementById("particles");
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement("div");
        particle.className = "particle";
        particle.style.left = Math.random() * 100 + "%";
        particle.style.animationDelay = Math.random() * 15 + "s";
        particle.style.animationDuration = Math.random() * 10 + 10 + "s";
        particlesContainer.appendChild(particle);
      }

      // إنشاء النجوم
      const starsContainer = document.getElementById("stars");
      for (let i = 0; i < 100; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.animationDelay = Math.random() * 3 + "s";
        starsContainer.appendChild(star);
      }

      // Login Modal
      const donateBtn = document.getElementById("donateBtn");
      const loginModal = document.getElementById("loginModal");
      const closeBtn = document.getElementById("closeBtn");
      const loginBtn = document.getElementById("loginBtn");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const errorMessage = document.getElementById("errorMessage");

      donateBtn.addEventListener("click", () => {
        loginModal.classList.add("active");
        usernameInput.value = "";
        passwordInput.value = "";
        errorMessage.classList.remove("active");
      });

      closeBtn.addEventListener("click", () => {
        loginModal.classList.remove("active");
      });

      loginModal.addEventListener("click", (e) => {
        if (e.target === loginModal) {
          loginModal.classList.remove("active");
        }
      });

      // التحقق من تسجيل الدخول
      loginBtn.addEventListener("click", () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (users[username] && users[username] === password) {
          // تسجيل دخول ناجح
          loginModal.classList.remove("active");
          window.open(
            "https://www.donationalerts.com/auth/login?redirectTo=https%3A%2F%2Fwww.donationalerts.com%2Fdashboard%2Fpayouts",
            "_blank",
          );
        } else {
          // خطأ في تسجيل الدخول
          errorMessage.classList.add("active");
          usernameInput.style.borderColor = "#ff4444";
          passwordInput.style.borderColor = "#ff4444";

          setTimeout(() => {
            usernameInput.style.borderColor = "rgba(220, 20, 60, 0.3)";
            passwordInput.style.borderColor = "rgba(220, 20, 60, 0.3)";
          }, 1000);
        }
      });

      // تسجيل الدخول بالضغط على Enter
      passwordInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          loginBtn.click();
        }
      });

      usernameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          passwordInput.focus();
        }
      });

      // إخفاء رسالة الخطأ عند الكتابة
      usernameInput.addEventListener("input", () => {
        errorMessage.classList.remove("active");
      });

      passwordInput.addEventListener("input", () => {
        errorMessage.classList.remove("active");
      });

      // تأثير الماوس على الكونتينر
      const container = document.querySelector(".container");
      document.addEventListener("mousemove", (e) => {
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = (y - centerY) / 50;
        const rotateY = (centerX - x) / 50;

        container.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      container.addEventListener("mouseleave", function () {
        this.style.transform = "perspective(1000px) rotateX(0) rotateY(0)";
      });

      // تشغيل الفيديو
      const bgVideo = document.getElementById("bgVideo");
      bgVideo.play().catch((e) => {
        console.log("Autoplay prevented:", e);
      });
    </script>
  </body>
</html>
